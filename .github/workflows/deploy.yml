name: Deploy to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      is-new-release: ${{ steps.version.outputs.is_new_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect version change
        id: version
        run: |
          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Query the latest release tag via GitHub API
          LAST_TAG=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | node -e "
              const chunks = [];
              process.stdin.on('data', c => chunks.push(c));
              process.stdin.on('end', () => {
                try {
                  const r = JSON.parse(Buffer.concat(chunks).toString());
                  console.log(r.tag_name ? r.tag_name.replace(/^v/, '') : 'none');
                } catch { console.log('none'); }
              });
            " 2>/dev/null || echo "none")

          LAST_VERSION="${LAST_TAG#v}"
          echo "last_version=$LAST_VERSION" >> $GITHUB_OUTPUT
          echo "is_new_release=$([ "$NEW_VERSION" != "$LAST_VERSION" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "Detected: new=$NEW_VERSION last_deployed=$LAST_VERSION → release=$([[ '$NEW_VERSION' != '$LAST_VERSION' ]] && echo YES || echo NO)"

      - name: Create git tag
        if: steps.version.outputs.is_new_release == 'true'
        run: |
          TAG="v${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -a -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.is_new_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Project Pages live at https://<user>.github.io/<repo>/; Vite must use matching base.
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
